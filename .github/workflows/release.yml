name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "Payment Clock v__VERSION__"
          releaseBody: "See the assets to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Inject README into DMG and re-upload as versionless
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH=$(find src-tauri/target -name "*.dmg" -not -name "*rw*" | head -1)
          echo "Found DMG: $DMG_PATH"
          chmod +x scripts/inject-dmg-readme.sh
          ./scripts/inject-dmg-readme.sh "$DMG_PATH" "src-tauri/dmg-resources/README.txt"

          DMG_NAME=$(basename "$DMG_PATH")
          VERSIONED_ASSET="${DMG_NAME// /.}"
          VERSIONLESS_NAME="Payment.Clock_aarch64.dmg"
          VERSIONLESS_PATH="$(dirname "$DMG_PATH")/$VERSIONLESS_NAME"
          cp "$DMG_PATH" "$VERSIONLESS_PATH"

          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release delete-asset "$TAG_NAME" "$VERSIONED_ASSET" -y || true
          gh release delete-asset "$TAG_NAME" "$VERSIONLESS_NAME" -y || true
          gh release upload "$TAG_NAME" "$VERSIONLESS_PATH"

      - name: Rename Windows installers to versionless
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          replace_asset() {
            local src="$1"
            local versionless_name="$2"
            local versioned_name
            versioned_name=$(basename "$src")
            versioned_name="${versioned_name// /.}"
            local versionless_path
            versionless_path="$(dirname "$src")/$versionless_name"
            cp "$src" "$versionless_path"
            gh release delete-asset "$TAG_NAME" "$versioned_name" -y || true
            gh release delete-asset "$TAG_NAME" "$versionless_name" -y || true
            gh release upload "$TAG_NAME" "$versionless_path"
          }

          EXE_PATH=$(find src-tauri/target -name "*_x64-setup.exe" | head -1)
          echo "Found EXE: $EXE_PATH"
          replace_asset "$EXE_PATH" "Payment.Clock_x64-setup.exe"
          if [ -f "${EXE_PATH}.sig" ]; then
            replace_asset "${EXE_PATH}.sig" "Payment.Clock_x64-setup.exe.sig"
          fi

          MSI_PATH=$(find src-tauri/target -name "*_x64_en-US.msi" | head -1)
          echo "Found MSI: $MSI_PATH"
          replace_asset "$MSI_PATH" "Payment.Clock_x64_en-US.msi"
          if [ -f "${MSI_PATH}.sig" ]; then
            replace_asset "${MSI_PATH}.sig" "Payment.Clock_x64_en-US.msi.sig"
          fi

  finalize-latest-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rewrite latest.json URLs to versionless filenames
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"

          gh release download "$TAG_NAME" --pattern "latest.json" --output latest.json
          echo "Original latest.json:"
          cat latest.json

          # Underscores cannot appear inside base64 signature payloads, so this
          # only touches URL fields.
          sed -i "s|_${VERSION}_|_|g" latest.json

          echo "Updated latest.json:"
          cat latest.json

          gh release delete-asset "$TAG_NAME" "latest.json" -y || true
          gh release upload "$TAG_NAME" latest.json
