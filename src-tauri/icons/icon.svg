<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="#7A73FF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Clock face - soft white circle -->
  <circle cx="256" cy="256" r="170" fill="rgba(255,255,255,0.12)"/>

  <!-- 12 dot markers around the clock (r=152 from center) -->
  <!-- 12 o'clock -->
  <circle cx="256" cy="104" r="10" fill="white"/>
  <!-- 1 o'clock -->
  <circle cx="332" cy="124" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 2 o'clock -->
  <circle cx="388" cy="180" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 3 o'clock -->
  <circle cx="408" cy="256" r="10" fill="white"/>
  <!-- 4 o'clock -->
  <circle cx="388" cy="332" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 5 o'clock -->
  <circle cx="332" cy="388" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 6 o'clock -->
  <circle cx="256" cy="408" r="10" fill="white"/>
  <!-- 7 o'clock -->
  <circle cx="180" cy="388" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 8 o'clock -->
  <circle cx="124" cy="332" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 9 o'clock - emphasized, the "trigger" moment -->
  <circle cx="104" cy="256" r="12" fill="white"/>
  <!-- 10 o'clock -->
  <circle cx="124" cy="180" r="6" fill="rgba(255,255,255,0.55)"/>
  <!-- 11 o'clock -->
  <circle cx="180" cy="124" r="6" fill="rgba(255,255,255,0.55)"/>

  <!-- Hour hand: pointing just before 9 (~8:59), angle ~269deg from 12 -->
  <!-- 9 o'clock = 270deg, just before = ~266deg -->
  <!-- x = 256 + 95*sin(266deg) = 256 + 95*(-0.9976) = 161.2 -->
  <!-- y = 256 - 95*cos(266deg) = 256 - 95*(-0.0698) = 262.6 -->
  <line x1="256" y1="256" x2="161" y2="262" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Minute hand: pointing just before 12 (~11:59 min), angle ~354deg -->
  <!-- x = 256 + 120*sin(354deg) = 256 + 120*(-0.1045) = 243.5 -->
  <!-- y = 256 - 120*cos(354deg) = 256 - 120*(0.9945) = 136.7 -->
  <line x1="256" y1="256" x2="244" y2="137" stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="18" fill="white"/>
</svg>
